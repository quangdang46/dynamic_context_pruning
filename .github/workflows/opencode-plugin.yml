name: Build & Publish NAPI-RS Bridge

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            napi-name: darwin-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            napi-name: darwin-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            napi-name: linux-x64-gnu
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            napi-name: win32-x64-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p opencode-dcp-bridge --target ${{ matrix.target }}
      - name: Rename to .node
        shell: bash
        run: |
          mkdir -p dist
          case "${{ runner.os }}" in
            macOS)
              src="target/${{ matrix.target }}/release/libopencode_dcp_bridge.dylib"
              ;;
            Linux)
              src="target/${{ matrix.target }}/release/libopencode_dcp_bridge.so"
              ;;
            Windows)
              src="target/${{ matrix.target }}/release/opencode_dcp_bridge.dll"
              ;;
          esac
          cp "$src" "dist/opencode-dcp-bridge.${{ matrix.napi-name }}.node"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.napi-name }}
          path: dist/opencode-dcp-bridge.${{ matrix.napi-name }}.node

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect native addons
        run: |
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu win32-x64-msvc; do
            src="artifacts/${triple}/opencode-dcp-bridge.${triple}.node"
            if [ -f "$src" ]; then
              cp "$src" opencode-dcp-plugin/
              echo "Collected opencode-dcp-bridge.${triple}.node"
            else
              echo "Warning: missing ${triple} artifact"
            fi
          done
          ls -la opencode-dcp-plugin/*.node
      - name: Install dependencies
        run: npm ci
        working-directory: opencode-dcp-plugin
      - name: Build TypeScript
        run: npx tsc
        working-directory: opencode-dcp-plugin
      - name: Set version from tag
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version
        working-directory: opencode-dcp-plugin
      - name: Publish to npm
        run: npm publish --access public
        working-directory: opencode-dcp-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
